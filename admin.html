<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudPy — Owner Panel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#060810;--bg2:#0b0f1a;--sidebar:#07090f;--o:#f97316;--o2:#ea580c;--green:#00ff88;--blue:#3b82f6;--red:#ff4444;--yellow:#fbbf24;--purple:#c084fc;--text:#e2e8f0;--muted:#64748b;--border:rgba(249,115,22,0.1);--og:0 0 20px rgba(249,115,22,0.25);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  /* LOGIN */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
  .lcard{background:var(--bg2);border:1px solid rgba(249,115,22,0.2);border-radius:16px;padding:44px 38px;width:100%;max-width:380px;text-align:center;box-shadow:0 0 60px rgba(249,115,22,0.05);}
  .ob{display:inline-flex;align-items:center;gap:7px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:50px;padding:4px 13px;font-size:10px;letter-spacing:3px;color:var(--o);margin-bottom:20px;}
  .lt{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;margin-bottom:5px;}
  .ls{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .pinput{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.15);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s;text-align:center;letter-spacing:4px;margin-bottom:12px;}
  .pinput:focus{border-color:var(--o);}
  .pbtn{width:100%;background:linear-gradient(135deg,var(--o),var(--o2));color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .pbtn:hover{box-shadow:var(--og);}
  .perr{color:var(--red);font-size:12px;margin-top:8px;font-family:'JetBrains Mono',monospace;display:none;}

  /* PANEL */
  .wrap{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{width:230px;min-width:230px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;}
  .sbl{display:flex;align-items:center;gap:9px;padding:18px 16px;border-bottom:1px solid var(--border);}
  .slm{width:30px;height:30px;background:linear-gradient(135deg,var(--o),var(--o2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;}
  .slt{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--o);letter-spacing:2px;}
  .slb{font-size:9px;letter-spacing:2px;color:rgba(249,115,22,0.5);padding:2px 6px;background:rgba(249,115,22,0.07);border-radius:3px;font-family:'JetBrains Mono',monospace;display:block;margin-top:2px;}
  .ss{padding:13px 12px 3px;font-size:10px;letter-spacing:3px;color:rgba(100,116,139,0.5);text-transform:uppercase;}
  .sb{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:7px;margin:2px 8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;background:transparent;width:calc(100% - 16px);text-align:left;}
  .sb:hover,.sb.on{background:rgba(249,115,22,0.08);color:var(--o);}
  .sb .i{font-size:14px;width:17px;flex-shrink:0;}
  .spacer{flex:1;}
  .sfooter{padding:12px 14px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .sfooter strong{color:var(--o);}

  /* MAIN */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(6,8,16,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;flex-shrink:0;}
  .tl{display:flex;align-items:center;gap:10px;}
  .ttitle{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;}
  .opill{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:50px;padding:2px 11px;font-size:9px;letter-spacing:2px;color:var(--o);font-family:'JetBrains Mono',monospace;font-weight:700;}
  .content{padding:24px 28px;flex:1;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:22px;}
  .sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
  .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .sc.o::before{background:linear-gradient(90deg,var(--o),transparent);}
  .sc.g::before{background:linear-gradient(90deg,var(--green),transparent);}
  .sc.b::before{background:linear-gradient(90deg,var(--blue),transparent);}
  .sc.p::before{background:linear-gradient(90deg,var(--purple),transparent);}
  .sc.r::before{background:linear-gradient(90deg,var(--red),transparent);}
  .sl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
  .sv{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;}
  .sv.o{color:var(--o);}.sv.g{color:var(--green);}.sv.b{color:var(--blue);}.sv.p{color:var(--purple);}.sv.r{color:var(--red);}
  .sub2{font-size:11px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;}

  /* PANELS */
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
  .pt{font-size:11px;letter-spacing:2px;font-weight:700;text-transform:uppercase;color:var(--text);font-family:'JetBrains Mono',monospace;}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{padding:9px 16px;text-align:left;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);}
  .tbl td{padding:12px 16px;border-bottom:1px solid rgba(249,115,22,0.04);font-size:13px;font-weight:600;}
  .tbl tr:hover td{background:rgba(255,255,255,0.015);}
  .tbl tr:last-child td{border-bottom:none;}
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;}
  .tag.online,.tag.running{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
  .tag.offline,.tag.stopped{background:rgba(100,116,139,0.15);color:var(--muted);border:1px solid rgba(100,116,139,0.2);}
  .tag.free{background:rgba(100,116,139,0.12);color:var(--muted);}
  .tag.pro{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
  .tag.paid{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
  .tag.pending{background:rgba(249,115,22,0.1);color:var(--o);border:1px solid rgba(249,115,22,0.2);}
  .tag.banned{background:rgba(255,68,68,0.12);color:var(--red);border:1px solid rgba(255,68,68,0.3);}
  .ab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin:1px;}
  .ab.ok{background:rgba(0,255,136,0.08);color:var(--green);}
  .ab.ok:hover{background:rgba(0,255,136,0.2);}
  .ab.warn{background:rgba(249,115,22,0.08);color:var(--o);}
  .ab.warn:hover{background:rgba(249,115,22,0.2);}
  .ab.danger{background:rgba(255,68,68,0.08);color:var(--red);}
  .ab.danger:hover{background:rgba(255,68,68,0.2);}

  /* INVOICE FORM */
  .irow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;padding:0 20px;}
  .fg label{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
  .fi{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.1);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
  .fi:focus{border-color:var(--o);}
  .send-btn{padding:9px 20px;background:linear-gradient(135deg,var(--o),var(--o2));color:#fff;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin:0 20px 16px;}
  .send-btn:hover{box-shadow:var(--og);}

  /* ANNOUNCE */
  .aform{padding:20px;}
  .ai{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color 0.2s;margin-bottom:10px;}
  .ai:focus{border-color:var(--o);}
  textarea.ai{resize:vertical;min-height:70px;}

  /* TOAST */
  #toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--bg2);border:1px solid var(--o);border-radius:9px;padding:11px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--o);display:none;box-shadow:var(--og);animation:ti 0.3s ease;max-width:320px;}
  #toast.err{border-color:var(--red);color:var(--red);}
  @keyframes ti{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.15);border-radius:2px;}
  @media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr);}.sidebar{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="lcard">
    <div class="ob">⚡ OWNER ACCESS</div>
    <div class="lt">OWNER PANEL</div>
    <div class="ls">Enter your owner secret key</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:5px;">BACKEND URL</label>
      <input class="pinput" type="text" id="backendUrlInput" placeholder="https://your-server.railway.app" style="letter-spacing:normal;text-align:left;font-size:12px;">
    </div>
    <input class="pinput" type="password" id="keyInput" placeholder="Owner secret key" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="pbtn" onclick="doLogin()">UNLOCK →</button>
    <div class="perr" id="loginErr">Wrong key or cannot reach backend.</div>
  </div>
</div>

<!-- PANEL -->
<div class="wrap" id="panelWrap" style="display:none;">
  <aside class="sidebar">
    <div class="sbl">
      <div class="slm">C</div>
      <div><div class="slt">CLOUDPY</div><span class="slb">OWNER PANEL</span></div>
    </div>
    <div class="ss">OVERVIEW</div>
    <button class="sb on" onclick="sv('stats',this)"><span class="i">📊</span> Stats</button>
    <button class="sb" onclick="sv('users',this)"><span class="i">👥</span> Users</button>
    <button class="sb" onclick="sv('sessions',this)"><span class="i">🖥️</span> Sessions</button>
    <button class="sb" onclick="sv('invoices',this)"><span class="i">🧾</span> Invoices</button>
    <div class="ss">ACTIONS</div>
    <button class="sb" onclick="sv('new-invoice',this)"><span class="i">➕</span> Issue Invoice</button>
    <button class="sb" onclick="sv('announce',this)"><span class="i">📢</span> Announce</button>
    <div class="spacer"></div>
    <div class="sfooter">Made by <strong>.yurix_</strong></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="tl"><span class="ttitle" id="vtitle">STATS</span><span class="opill">OWNER</span></div>
    </div>
    <div class="content" id="vc"></div>
  </main>
</div>

<div id="toast"></div>

<script>
let BACKEND = '';
let OWNER_KEY = '';

// Load saved backend
document.getElementById('backendUrlInput').value = localStorage.getItem('cloudpy_backend') || '';

async function doLogin() {
  BACKEND   = document.getElementById('backendUrlInput').value.trim().replace(/\/$/,'');
  OWNER_KEY = document.getElementById('keyInput').value.trim();
  if (!BACKEND || !OWNER_KEY) { showLoginErr('Fill in both fields'); return; }
  localStorage.setItem('cloudpy_backend', BACKEND);
  try {
    const res = await ownerApi('GET', '/api/owner/stats');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panelWrap').style.display = 'flex';
    renderStats(res);
  } catch (e) { showLoginErr(e.message); }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

async function ownerApi(method, path, body) {
  const opts = { method, headers: { 'x-owner-key': OWNER_KEY, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(BACKEND + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function sv(view, el) {
  document.querySelectorAll('.sb').forEach(b => b.classList.remove('on'));
  if (el) el.classList.add('on');
  document.getElementById('vtitle').textContent = view.replace('-',' ').toUpperCase();
  switch(view) {
    case 'stats':      ownerApi('GET','/api/owner/stats').then(renderStats); break;
    case 'users':      ownerApi('GET','/api/owner/users').then(renderUsers); break;
    case 'sessions':   ownerApi('GET','/api/owner/sessions').then(renderSessions); break;
    case 'invoices':   ownerApi('GET','/api/owner/invoices').then(renderInvoices); break;
    case 'new-invoice':renderNewInvoice(); break;
    case 'announce':   renderAnnounce(); break;
  }
}

function vc(html) { document.getElementById('vc').innerHTML = html; }

function renderStats(d) {
  vc(`
  <div class="stats">
    <div class="sc o"><div class="sl">MRR</div><div class="sv o">$${(d.revenue||0).toFixed(2)}</div><div class="sub2">monthly revenue</div></div>
    <div class="sc g"><div class="sl">Running</div><div class="sv g">${d.runningSessions||0}</div><div class="sub2">live sessions</div></div>
    <div class="sc b"><div class="sl">Users</div><div class="sv b">${d.users||0}</div><div class="sub2">${d.proUsers||0} pro</div></div>
    <div class="sc p"><div class="sl">Total Sessions</div><div class="sv p">${d.totalSessions||0}</div><div class="sub2">all time</div></div>
    <div class="sc r"><div class="sl">Banned</div><div class="sv r">${d.banned||0}</div><div class="sub2">accounts</div></div>
  </div>
  <div class="panel">
    <div class="ph"><span class="pt">QUICK STATS</span></div>
    <div style="padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);">
      <div>Total Log Lines<br><strong style="color:var(--text);font-size:18px;">${(d.totalLogs||0).toLocaleString()}</strong></div>
      <div>Pro Conversion<br><strong style="color:var(--green);font-size:18px;">${d.users ? Math.round((d.proUsers/d.users)*100) : 0}%</strong></div>
      <div>Avg Sessions/User<br><strong style="color:var(--blue);font-size:18px;">${d.users ? (d.totalSessions/d.users).toFixed(1) : 0}</strong></div>
    </div>
  </div>`);
}

function renderUsers(users) {
  vc(`<div class="panel">
    <div class="ph"><span class="pt">ALL USERS (${users.length})</span></div>
    <table class="tbl"><thead><tr>
      <th>USER</th><th>PLAN</th><th>STATUS</th><th>JOINED</th><th>ACTIONS</th>
    </tr></thead><tbody>
    ${users.map(u=>`<tr>
      <td><div style="font-weight:700;">${u.username}</div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">#${u.discord_id}</div></td>
      <td><span class="tag ${u.plan}">${u.plan.toUpperCase()}</span></td>
      <td><span class="tag ${u.banned?'banned':'online'}">${u.banned?'BANNED':'ACTIVE'}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">${new Date(u.created_at*1000).toLocaleDateString()}</td>
      <td>
        <button class="ab ok" onclick="upgradeUser('${u.id}','pro')">↑ PRO</button>
        <button class="ab warn" onclick="upgradeUser('${u.id}','free')">↓ FREE</button>
        <button class="ab danger" onclick="banUser('${u.id}',${u.banned?0:1})">${u.banned?'UNBAN':'BAN'}</button>
      </td>
    </tr>`).join('')}
    </tbody></table></div>`);
}

function renderSessions(sessions) {
  vc(`<div class="panel">
    <div class="ph"><span class="pt">ALL SESSIONS (${sessions.length})</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);">${sessions.filter(s=>s.live).length} running</span></div>
    <table class="tbl"><thead><tr>
      <th>SESSION</th><th>OWNER</th><th>PLAN</th><th>STATUS</th><th>RESTARTS</th><th>ACTIONS</th>
    </tr></thead><tbody>
    ${sessions.map(s=>`<tr>
      <td><div style="font-weight:700;">${s.name}</div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">${s.file_name}</div></td>
      <td style="color:var(--muted);font-size:13px;">${s.username}</td>
      <td><span class="tag ${s.plan}">${s.plan.toUpperCase()}</span></td>
      <td><span class="tag ${s.live?'running':'stopped'}">${s.live?'RUNNING':'STOPPED'}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--muted);">${s.restart_count||0}×</td>
      <td><button class="ab danger" onclick="killSession('${s.id}')">KILL</button></td>
    </tr>`).join('')}
    </tbody></table></div>`);
}

function renderInvoices(invs) {
  vc(`<div class="panel">
    <div class="ph"><span class="pt">ALL INVOICES (${invs.length})</span></div>
    <table class="tbl"><thead><tr>
      <th>#</th><th>USER</th><th>AMOUNT</th><th>STATUS</th><th>ISSUED</th><th>ACTIONS</th>
    </tr></thead><tbody>
    ${invs.map(i=>`<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;">#${i.id.slice(0,8).toUpperCase()}</td>
      <td>${i.username}</td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--green);font-weight:700;">$${Number(i.amount).toFixed(2)}</td>
      <td><span class="tag ${i.status}">${i.status.toUpperCase()}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">${new Date(i.issued_at*1000).toLocaleDateString()}</td>
      <td>
        <button class="ab ok" onclick="markPaid('${i.id}')">MARK PAID</button>
        <button class="ab warn" onclick="markStatus('${i.id}','overdue')">OVERDUE</button>
      </td>
    </tr>`).join('')}
    </tbody></table></div>`);
}

function renderNewInvoice() {
  ownerApi('GET','/api/owner/users').then(users => {
    vc(`<div class="panel" style="max-width:560px;">
      <div class="ph"><span class="pt">ISSUE INVOICE</span></div>
      <div style="padding:20px;">
        <div class="irow" style="padding:0;margin-bottom:12px;">
          <div class="fg"><label>USER</label>
            <select class="fi" id="invUser">
              ${users.map(u=>`<option value="${u.id}">${u.username}</option>`).join('')}
            </select>
          </div>
          <div class="fg"><label>AMOUNT (USD)</label><input class="fi" type="number" id="invAmt" placeholder="7.00" step="0.01"></div>
        </div>
        <div class="irow" style="padding:0;margin-bottom:12px;">
          <div class="fg"><label>DESCRIPTION</label><input class="fi" id="invDesc" placeholder="CloudPy Pro — January 2025"></div>
          <div class="fg"><label>DUE DATE</label><input class="fi" type="date" id="invDue"></div>
        </div>
        <button class="send-btn" style="margin:0;" onclick="issueInvoice()">ISSUE INVOICE →</button>
      </div>
    </div>`);
  });
}

function renderAnnounce() {
  vc(`<div class="panel" style="max-width:560px;">
    <div class="ph"><span class="pt">BROADCAST ANNOUNCEMENT</span></div>
    <div class="aform">
      <label style="font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px;">TITLE</label>
      <input class="ai" type="text" id="annTitle" placeholder="Scheduled Maintenance">
      <label style="font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px;">MESSAGE</label>
      <textarea class="ai" id="annBody" placeholder="We will perform maintenance on Jan 20 from 2am-4am UTC..."></textarea>
      <label style="font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px;">TARGET</label>
      <select class="ai" id="annTarget" style="margin-bottom:14px;">
        <option value="all">All Users</option>
        <option value="pro">Pro Users</option>
        <option value="free">Free Users</option>
      </select>
      <button class="send-btn" style="margin:0;" onclick="sendAnnouncement()">📢 BROADCAST →</button>
    </div>
  </div>`);
}

// Actions
async function upgradeUser(id, plan) {
  try { await ownerApi('PATCH',`/api/owner/users/${id}`,{plan}); toast(`Plan updated to ${plan}`); } catch(e){toast(e.message,true);}
}
async function banUser(id, banned) {
  try { await ownerApi('PATCH',`/api/owner/users/${id}`,{banned:!!banned}); toast(banned?'User banned':'User unbanned'); ownerApi('GET','/api/owner/users').then(renderUsers); } catch(e){toast(e.message,true);}
}
async function killSession(id) {
  try { await ownerApi('POST',`/api/owner/sessions/${id}/kill`); toast('Session killed'); ownerApi('GET','/api/owner/sessions').then(renderSessions); } catch(e){toast(e.message,true);}
}
async function markPaid(id) {
  try { await ownerApi('PATCH',`/api/owner/invoices/${id}`,{status:'paid'}); toast('Marked as paid'); ownerApi('GET','/api/owner/invoices').then(renderInvoices); } catch(e){toast(e.message,true);}
}
async function markStatus(id, status) {
  try { await ownerApi('PATCH',`/api/owner/invoices/${id}`,{status}); toast('Status updated'); ownerApi('GET','/api/owner/invoices').then(renderInvoices); } catch(e){toast(e.message,true);}
}
async function issueInvoice() {
  const userId = document.getElementById('invUser').value;
  const amount = parseFloat(document.getElementById('invAmt').value);
  const desc   = document.getElementById('invDesc').value.trim();
  const due    = document.getElementById('invDue').value;
  if (!amount) { toast('Enter an amount', true); return; }
  try { await ownerApi('POST','/api/owner/invoices',{userId,amount,description:desc,dueDate:due||null}); toast('Invoice issued!'); } catch(e){toast(e.message,true);}
}
async function sendAnnouncement() {
  const title  = document.getElementById('annTitle').value.trim();
  const body   = document.getElementById('annBody').value.trim();
  const target = document.getElementById('annTarget').value;
  if (!title||!body) { toast('Fill in title and message', true); return; }
  try { await ownerApi('POST','/api/owner/announce',{title,body,target}); toast('Announcement broadcast!'); } catch(e){toast(e.message,true);}
}

function toast(msg, err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=err?'err':''; t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}
</script>
</body>
</html>
