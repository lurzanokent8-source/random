<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majestic AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #2e1065);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .rainbow-text {
            background: linear-gradient(to right, #60a5fa, #a855f7, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .message-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <div class="glass w-full max-w-5xl h-[90vh] flex flex-col relative overflow-hidden">
        
        <div class="p-6 flex justify-between items-center border-b border-white/10">
            <div>
                <h1 class="text-3xl rainbow-text">Majestic Uncensored AI</h1>
                <p class="text-xs text-gray-400 mt-1">High-Speed Inference • Serverless</p>
            </div>
            <button onclick="toggleSettings()" class="p-2 hover:bg-white/10 rounded-full transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 chat-area">
            <div class="message-fade-in flex flex-col items-start">
                <div class="glass px-4 py-1 text-blue-300 text-[10px] mb-1 uppercase tracking-widest">System</div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 max-w-[80%]">
                    Ready. The first message might take a few seconds while the engine warms up!
                </div>
            </div>
        </div>

        <div class="p-6 bg-white/5 border-t border-white/10">
            <div class="flex gap-4">
                <input id="userInput" type="text" placeholder="Ask anything uncensored..." 
                    class="glass flex-1 bg-transparent p-4 outline-none focus:ring-2 ring-blue-500 transition-all duration-300"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()" class="bg-gradient-to-r from-blue-600 to-purple-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 active:scale-95 transition-all duration-200">
                    Send
                </button>
            </div>
        </div>

        <div id="settingsModal" class="hidden absolute inset-0 glass z-20 flex items-center justify-center p-4">
            <div class="bg-slate-900 border border-white/20 w-full max-w-md p-8 rounded-[32px] shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 text-center">Engine Config</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Model ID</label>
                        <input id="modelId" type="text" value="huihui-ai/Llama-3.2-3B-Instruct-abliterated" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">API Token</label>
                        <input id="apiToken" type="password" value="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" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                    </div>
                </div>
                <button onclick="toggleSettings()" class="w-full mt-8 bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition-colors">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }

        async function queryModel(model, token, text) {
            const response = await fetch(`https://api-inference.huggingface.co/models/${model}`, {
                headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: text, parameters: { max_new_tokens: 500, return_full_text: false } }),
            });
            const data = await response.json();
            
            // If model is loading, it returns a 503 error with estimated_time
            if (response.status === 503) {
                return { loading: true, et: data.estimated_time || 20 };
            }
            return data;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const sendBtn = document.getElementById('sendBtn');
            const token = document.getElementById('apiToken').value;
            const model = document.getElementById('modelId').value;

            if (!input.value.trim() || sendBtn.disabled) return;

            const userText = input.value;
            input.value = "";
            sendBtn.disabled = true;
            sendBtn.innerText = "⏳";

            // Add User Message
            chatBox.innerHTML += `<div class="message-fade-in flex flex-col items-end"><div class="glass px-4 py-1 text-purple-400 text-[10px] mb-1 uppercase tracking-widest">You</div><div class="bg-blue-600/20 border border-blue-500/30 rounded-2xl p-4 max-w-[80%]">${userText}</div></div>`;
            
            // Add Loading Placeholder
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="message-fade-in flex flex-col items-start"><div class="glass px-4 py-1 text-blue-300 text-[10px] mb-1 uppercase tracking-widest">AI Agent</div><div class="bg-white/5 border border-white/10 rounded-2xl p-4 italic text-gray-400">Typing...</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            let result;
            let success = false;

            // Simple retry logic if model is loading
            for(let i = 0; i < 5; i++) {
                result = await queryModel(model, token, userText);
                if (result.loading) {
                    document.getElementById(loadingId).querySelector('div:last-child').innerText = `Engine warming up... (${Math.round(result.et)}s)`;
                    await new Promise(r => setTimeout(r, 5000)); // Wait 5 seconds before retry
                } else {
                    success = true;
                    break;
                }
            }

            const aiBubble = document.getElementById(loadingId).querySelector('div:last-child');
            aiBubble.classList.remove('italic', 'text-gray-400');

            if (success && Array.isArray(result)) {
                aiBubble.innerText = result[0].generated_text || "No response.";
            } else if (success && result.generated_text) {
                aiBubble.innerText = result.generated_text;
            } else {
                aiBubble.innerText = "Error: Model took too long to load. Please try one more time!";
                aiBubble.classList.add('text-red-400');
            }

            sendBtn.disabled = false;
            sendBtn.innerText = "Send";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
