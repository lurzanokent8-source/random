<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAJESTIC_HACKER_AI</title>
    <style>
        :root { --neon: #00f2ff; --bg: #020202; --panel: rgba(20, 20, 20, 0.8); }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Background Glow Effect */
        body::before { content: ''; position: absolute; width: 300px; height: 300px; background: var(--neon); filter: blur(150px); opacity: 0.1; top: -100px; left: -100px; z-index: -1; }

        .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; opacity: 0; transform: scale(0.98); }
        .active { display: flex; opacity: 1; transform: scale(1); }

        /* Majestic Login Card */
        .login-card { background: var(--panel); border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(20px); padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }
        input { background: rgba(0,0,0,0.6); border: 1px solid #333; color: var(--neon); padding: 15px; border-radius: 10px; width: 280px; outline: none; margin-bottom: 20px; font-family: monospace; text-align: center; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        button { background: var(--neon); color: #000; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--neon); }

        /* Main Majestic Chat UI */
        .app-container { width: 95%; height: 90%; display: flex; gap: 20px; }
        .sidebar { width: 250px; background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; flex-direction: column; }
        .main-chat { flex-grow: 1; background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-log { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 18px 25px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.6; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--neon), #00a2ff); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        .think-trace { color: #888; font-size: 13px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 2px solid var(--neon); }

        .input-box { padding: 25px; background: rgba(0,0,0,0.4); display: flex; gap: 15px; align-items: center; }
        .input-box input { flex-grow: 1; margin: 0; text-align: left; background: transparent; border: none; border-bottom: 1px solid #333; border-radius: 0; }
        
        /* Toggle Switch */
        .toggle-group { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #666; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; border-radius: 20px; border: 1px solid var(--neon); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: var(--neon); border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <div class="login-card">
        <h1 style="letter-spacing: 8px; color: var(--neon);">OS_INVOKE</h1>
        <p style="color: #555; margin-bottom: 30px;">BIOMETRIC OR KEY BYPASS REQUIRED</p>
        <input type="password" id="pass" placeholder="ACCESS_CODE">
        <br>
        <button onclick="auth()">INITIALIZE</button>
    </div>
</div>

<div id="chatScreen" class="screen">
    <div class="app-container">
        <div class="sidebar">
            <h3 style="color: var(--neon); font-size: 14px;">SESSION_LOGS</h3>
            <div style="flex-grow: 1; color: #444; font-size: 12px;">No previous records...</div>
            <button onclick="location.reload()" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px;">PURGE_SESSION</button>
        </div>
        <div class="main-chat">
            <div class="chat-log" id="log"></div>
            <div class="input-box">
                <div class="toggle-group">
                    <span>THINK</span>
                    <label class="switch"><input type="checkbox" id="think"><span class="slider"></span></label>
                </div>
                <input type="text" id="userInput" placeholder="Type a command..." autocomplete="off">
                <button onclick="send()" style="padding: 10px 20px;">EXEC</button>
            </div>
        </div>
    </div>
</div>

<script>
    function auth() {
        if(document.getElementById('pass').value === "admin") {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
        }
    }

    async function send() {
        const input = document.getElementById('userInput');
        const chatLog = document.getElementById('log');
        const val = input.value;
        if(!val) return;

        input.value = '';
        chatLog.innerHTML += `<div class="msg user">${val}</div>`;
        chatLog.scrollTop = chatLog.scrollHeight;

        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerHTML = '<i>Processing...</i>';
        chatLog.appendChild(aiMsg);

        try {
            const res = await fetch('http://localhost:11434/api/chat', {
                method: 'POST',
                body: JSON.stringify({
                    model: "deepseek-r1:1.5b",
                    messages: [{role: "user", content: val}],
                    stream: false
                })
            });
            const data = await res.json();
            aiMsg.innerHTML = '';

            if(data.message.reasoning) {
                aiMsg.innerHTML += `<div class="think-trace">THOUGHT: ${data.message.reasoning}</div>`;
            }
            aiMsg.innerHTML += `<div>${data.message.content}</div>`;
        } catch (e) {
            aiMsg.innerHTML = '<span style="color:red">CONNECTION_LOST: Run Ollama with OLLAMA_ORIGINS="*"</span>';
        }
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
